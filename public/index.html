<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NotaríaÚnica - Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <i class="bi bi-building-lock"></i>
        <h1>NotaríaÚnica</h1>
        <p>Sistema de Gestión Documental</p>
      </div>

      <form id="loginForm" class="mt-4" autocomplete="off">
        <div id="alertBox" class="alert d-none mb-3"></div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" id="username" class="form-control form-control-lg" placeholder="Usuario" required>
          </div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
            <input type="password" id="password" class="form-control form-control-lg" placeholder="Contraseña" required>
            <button type="button" class="btn btn-outline-secondary" id="togglePwd">
              <i class="bi bi-eye" id="eyeIcon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-login w-100 btn-lg" id="loginBtn">
          <span id="loginSpinner" class="spinner-border spinner-border-sm me-2 d-none"></span>
          <i class="bi bi-box-arrow-in-right me-2" id="loginIcon"></i>Iniciar Sesión
        </button>
      </form>

      <div class="text-center mt-4">
        <small class="text-muted"><i class="bi bi-shield-lock me-1"></i>Acceso restringido — Sistema seguro</small>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    if (localStorage.getItem('token')) window.location.href = '/dashboard';

    document.getElementById('togglePwd').addEventListener('click', () => {
      const pwd = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pwd.type === 'password') { pwd.type = 'text'; icon.className = 'bi bi-eye-slash'; }
      else { pwd.type = 'password'; icon.className = 'bi bi-eye'; }
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('loginSpinner');
      const icon = document.getElementById('loginIcon');
      const alertBox = document.getElementById('alertBox');

      btn.disabled = true;
      spinner.classList.remove('d-none');
      icon.classList.add('d-none');
      alertBox.className = 'alert d-none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/dashboard';
        } else {
          alertBox.className = 'alert alert-danger';
          alertBox.innerHTML = `<i class="bi bi-exclamation-circle me-2"></i>${data.error}`;
          btn.disabled = false;
          spinner.classList.add('d-none');
          icon.classList.remove('d-none');
        }
      } catch {
        alertBox.className = 'alert alert-danger';
        alertBox.innerHTML = '<i class="bi bi-wifi-off me-2"></i>Error de conexión con el servidor';
        btn.disabled = false;
        spinner.classList.add('d-none');
        icon.classList.remove('d-none');
      }
    });
  </script>
</body>
</html>
